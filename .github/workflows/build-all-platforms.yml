name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  APP_NAME: VideoDownloader
  VERSION: ${{ github.ref_name }}
  APPIMAGEDIR: /tmp/AppDir

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: windows-installer
            file_pattern: "*.exe"
          - os: macos-latest
            artifact_name: macos-installer
            file_pattern: "*.dmg"
          - os: ubuntu-latest
            artifact_name: linux-installer
            file_pattern: "*.tar.gz"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Move-Item -Path ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe -Destination backend/
          Move-Item -Path ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe -Destination backend/

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # =======================================================================
      # Windows Build
      # =======================================================================
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          cd backend

          # 移动 FFmpeg 到 backend 目录以便 PyInstaller 打包
          if (Test-Path ffmpeg.exe) {
            Copy-Item -Path ffmpeg.exe -Destination .\
            Copy-Item -Path ffprobe.exe -Destination .\
          }

          # 使用 onedir 模式创建应用程序目录
          pyinstaller --name VideoDownloader `
            --onedir `
            --add-data "../frontend/dist;frontend/dist" `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import fastapi.responses `
            --hidden-import fastapi.middleware.cors `
            --hidden-import fastapi.websockets `
            --hidden-import yt_dlp `
            --hidden-import yt_dlp.extractor `
            --hidden-import websockets `
            --hidden-import pydantic `
            --console `
            --clean `
            --noconfirm `
            --distpath ./dist `
            --workpath ./build `
            main.py

          # 验证输出
          Write-Host "Files in dist:"
          Get-ChildItem -Recurse dist\

      - name: Create installer folder (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path installer\windows
          # 复制整个 VideoExporter 目录（onedir 模式输出）
          Copy-Item -Path backend\dist\VideoDownloader\* -Destination installer\windows\ -Recurse

          # 列出文件用于调试
          Write-Host "Files in installer/windows:"
          Get-ChildItem -Recurse installer\windows\

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup -y

      - name: Build Inno Setup Installer
        if: runner.os == 'Windows'
        run: |
          $version = "${{ env.VERSION }}" -replace '^v', ''
          if ($version -eq "") { $version = "1.0.0" }

          $outputDir = "$(Resolve-Path .)\output\windows"
          $distDir = "$(Resolve-Path .)\installer\windows"

          $issContent = @"
          [Setup]
          AppName=${{ env.APP_NAME }}
          AppVersion=$version
          AppPublisher=Video Downloader
          DefaultDirName={pf}\${{ env.APP_NAME }}
          DefaultGroupName=${{ env.APP_NAME }}
          OutputDir=$outputDir
          OutputBaseFilename=${{ env.APP_NAME }}-Setup-$version-win64
          UninstallDisplayIcon={app}\${{ env.APP_NAME }}.exe
          Compression=lzma2
          SolidCompression=yes
          PrivilegesRequired=admin
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Files]
          Source: "$distDir\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.APP_NAME }}.exe"
          Name: "{commondesktop}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.APP_NAME }}.exe"
          Name: "{autoprograms}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.APP_NAME }}.exe"

          [Run]
          Filename: "{app}\${{ env.APP_NAME }}.exe"; Description: "{cm:LaunchProgram,${{ env.APP_NAME }}}"; Flags: nowait postinstall skipifsilent
          "@

          Set-Content -Path "installer\windows\VideoDownloader.iss" -Value $issContent -Encoding UTF8
          iscc "installer\windows\VideoDownloader.iss"

      - name: Upload Windows Installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: output/windows/*.exe
          retention-days: 30

      # =======================================================================
      # macOS Build
      # =======================================================================
      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          cd backend

          # 使用 onedir 模式创建应用程序目录
          pyinstaller --name VideoDownloader \
            --onedir \
            --add-data "../frontend/dist:frontend/dist" \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import fastapi \
            --hidden-import fastapi.responses \
            --hidden-import fastapi.middleware.cors \
            --hidden-import fastapi.websockets \
            --hidden-import yt_dlp \
            --hidden-import yt_dlp.extractor \
            --hidden-import websockets \
            --hidden-import pydantic \
            --console \
            --clean \
            --noconfirm \
            --distpath ./dist \
            --workpath ./build \
            main.py

          # 验证输出
          echo "Files in dist:"
          ls -la dist/

      - name: Create macOS App Bundle
        if: runner.os == 'macOS'
        run: |
          # PyInstaller onedir 模式已经创建了正确的目录结构
          # VideoDownloader.app 已经在 backend/dist/VideoDownloader.app/

          # 移动到输出目录
          mkdir -p output/macos
          cp -R backend/dist/VideoDownloader.app output/macos/

          # 复制 FFmpeg 到 app bundle 的 MacOS 目录
          cp $(which ffmpeg) output/macos/VideoDownloader.app/Contents/MacOS/ffmpeg
          cp $(which ffprobe) output/macos/VideoDownloader.app/Contents/MacOS/ffprobe

          # 更新 Info.plist 确保正确配置
          cat > output/macos/VideoDownloader.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>VideoDownloader</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon.icns</string>
              <key>CFBundleIdentifier</key>
              <string>com.videodownloader.app</string>
              <key>CFBundleName</key>
              <string>${{ env.APP_NAME }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ env.VERSION }}</string>
              <key>CFBundleVersion</key>
              <string>${{ env.VERSION }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Create DMG
        if: runner.os == 'macOS'
        run: |
          version="${{ env.VERSION }}"
          version="${version#v}"
          [ -z "$version" ] && version="1.0.0"

          mkdir -p output/dmg
          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 200 \
            --icon "VideoDownloader.app" 150 200 \
            --hide-extension "VideoDownloader.app" \
            output/dmg/${{ env.APP_NAME }}-${version}-macos-universal.dmg \
            output/macos/VideoDownloader.app

          # 移除隔离属性
          xattr -rd com.apple.quarantine output/dmg/*.dmg 2>/dev/null || true

      - name: Create ZIP (alternative for macOS)
        if: runner.os == 'macOS'
        run: |
          version="${{ env.VERSION }}"
          version="${version#v}"
          [ -z "$version" ] && version="1.0.0"

          mkdir -p output/zip
          ditto -c -k --sequesterRsrc --keepParent output/macos/VideoDownloader.app output/zip/${{ env.APP_NAME }}-${version}-macos-universal.zip
          # 移除隔离属性
          xattr -rd com.apple.quarantine output/zip/*.zip 2>/dev/null || true

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            output/dmg/*.dmg
            output/zip/*.zip
          retention-days: 30

      # =======================================================================
      # Linux Build
      # =======================================================================
      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          cd backend

          # 使用 onedir 模式创建应用程序目录
          pyinstaller --name VideoDownloader \
            --onedir \
            --add-data "../frontend/dist:frontend/dist" \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import fastapi \
            --hidden-import fastapi.responses \
            --hidden-import fastapi.middleware.cors \
            --hidden-import fastapi.websockets \
            --hidden-import yt_dlp \
            --hidden-import yt_dlp.extractor \
            --hidden-import websockets \
            --hidden-import pydantic \
            --console \
            --clean \
            --noconfirm \
            --distpath ./dist \
            --workpath ./build \
            main.py

          # 验证输出
          echo "Files in dist:"
          ls -la dist/

      - name: Package Linux distribution (tar.gz)
        if: runner.os == 'Linux'
        run: |
          version="${{ env.VERSION }}"
          version="${version#v}"
          [ -z "$version" ] && version="1.0.0"

          mkdir -p output/linux
          cp -r backend/dist/VideoDownloader/* output/linux/
          cp $(which ffmpeg) output/linux/
          cp $(which ffprobe) output/linux/

          cd output/linux
          tar -czf ../${{ env.APP_NAME }}-${version}-linux-x86_64.tar.gz *

      - name: Upload Linux archive
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: output/*.tar.gz
          retention-days: 30

      # =======================================================================
      # Linux AppImage Build
      # =======================================================================
      - name: Install linuxdeploy
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
          sudo apt-get install -y librsvg2-bin

      - name: Prepare AppDir
        if: runner.os == 'Linux'
        run: |
          version="${{ env.VERSION }}"
          version="${version#v}"
          [ -z "$version" ] && version="1.0.0"

          mkdir -p ${{ env.APPIMAGEDIR }}/usr/bin
          mkdir -p ${{ env.APPIMAGEDIR }}/usr/lib
          mkdir -p ${{ env.APPIMAGEDIR }}/usr/share/applications
          mkdir -p ${{ env.APPIMAGEDIR }}/usr/share/icons/hicolor/256x256/apps

          # 复制主程序 (onedir 模式输出)
          cp -r backend/dist/VideoDownloader/* ${{ env.APPIMAGEDIR }}/usr/bin/
          cp $(which ffmpeg) ${{ env.APPIMAGEDIR }}/usr/lib/
          cp $(which ffprobe) ${{ env.APPIMAGEDIR }}/usr/lib/

          # 创建启动脚本
          cat > ${{ env.APPIMAGEDIR }}/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$HERE/usr/lib:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/VideoDownloader" "$@"
          EOF
          chmod +x ${{ env.APPIMAGEDIR }}/AppRun

          # 创建 desktop 文件
          cat > ${{ env.APPIMAGEDIR }}/usr/share/applications/${{ env.APP_NAME }}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Comment=Video Downloader based on yt-dlp
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Utility;Network;
          EOF

          # 创建简易图标（粉色背景 + 白色播放按钮）
          cat > /tmp/icon.svg << 'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
            <rect fill="#e91e63" width="256" height="256" rx="40"/>
            <path fill="#ffffff" d="M100 70l100 66-100 66V70z"/>
          </svg>
          SVG
          # 转换为 PNG (需要安装 librsvg)
          rsvg-convert -w 256 -h 256 /tmp/icon.svg -o ${{ env.APPIMAGEDIR }}/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          cp ${{ env.APPIMAGEDIR }}/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png ${{ env.APPIMAGEDIR }}/${{ env.APP_NAME }}.png

      - name: Build AppImage
        if: runner.os == 'Linux'
        run: |
          version="${{ env.VERSION }}"
          version="${version#v}"
          [ -z "$version" ] && version="1.0.0"

          mkdir -p output/appimage

          # 安装 librsvg 用于 SVG 转 PNG
          sudo apt-get install -y librsvg2-bin

          # 重新生成图标
          rsvg-convert -w 256 -h 256 /tmp/icon.svg -o ${{ env.APPIMAGEDIR }}/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          cp ${{ env.APPIMAGEDIR }}/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png ${{ env.APPIMAGEDIR }}/${{ env.APP_NAME }}.png

          # 构建 AppImage
          linuxdeploy --appdir ${{ env.APPIMAGEDIR }} --output appimage --icon-filename ${{ env.APP_NAME }}

          # 重命名为带版本号的名称
          mv *.AppImage output/appimage/${{ env.APP_NAME }}-${version}-linux-x86_64.AppImage

      - name: Upload AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: output/appimage/*.AppImage
          retention-days: 30

  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: ./artifacts

      - name: Download Linux tar.gz
        uses: actions/download-artifact@v4
        with:
          name: linux-installer
          path: ./artifacts

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.exe
            ./artifacts/*.dmg
            ./artifacts/*.zip
            ./artifacts/*.tar.gz
            ./artifacts/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
