name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: VideoDownloader
  VERSION: ${{ github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: windows-installer
            file_pattern: "*.exe"
          - os: macos-latest
            artifact_name: macos-installer
            file_pattern: "*.dmg"
          - os: ubuntu-latest
            artifact_name: linux-installer
            file_pattern: "*.tar.gz"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Move-Item -Path ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe -Destination backend/
          Move-Item -Path ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe -Destination backend/

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # =======================================================================
      # Windows Build
      # =======================================================================
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          cd backend
          pyinstaller ../packaging/VideoDownloader.spec --clean --noconfirm

      - name: Copy FFmpeg to dist (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item -Path backend\ffmpeg.exe -Destination backend\dist\
          Copy-Item -Path backend\ffprobe.exe -Destination backend\dist\

      - name: Create installer folder (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path installer\windows
          Copy-Item -Path backend\dist\* -Destination installer\windows\ -Recurse

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup -y

      - name: Build Inno Setup Installer
        if: runner.os == 'Windows'
        run: |
          $version = "${{ env.VERSION }}" -replace '^v', ''
          if ($version -eq "") { $version = "1.0.0" }

          $outputDir = "$(Resolve-Path .)\output\windows"
          $distDir = "$(Resolve-Path .)\installer\windows"

          $issContent = @"
          [Setup]
          AppName=${{ env.APP_NAME }}
          AppVersion=$version
          AppPublisher=Video Downloader
          DefaultDirName={pf}\${{ env.APP_NAME }}
          DefaultGroupName=${{ env.APP_NAME }}
          OutputDir=$outputDir
          OutputBaseFilename=${{ env.APP_NAME }}-Setup-$version-win64
          UninstallDisplayIcon={app}\${{ env.APP_NAME }}.exe
          Compression=lzma2
          SolidCompression=yes
          PrivilegesRequired=admin
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Files]
          Source: "$distDir\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.APP_NAME }}.exe"
          Name: "{commondesktop}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.APP_NAME }}.exe"
          Name: "{autoprograms}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.APP_NAME }}.exe"

          [Run]
          Filename: "{app}\${{ env.APP_NAME }}.exe"; Description: "{cm:LaunchProgram,${{ env.APP_NAME }}}"; Flags: nowait postinstall skipifsilent
          "@

          Set-Content -Path "installer\windows\VideoDownloader.iss" -Value $issContent -Encoding UTF8
          iscc "installer\windows\VideoDownloader.iss"

      - name: Upload Windows Installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: output/windows/*.exe
          retention-days: 30

      # =======================================================================
      # macOS Build
      # =======================================================================
      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          cd backend
          pyinstaller ../packaging/VideoDownloader.spec --clean --noconfirm

      - name: Create macOS App Bundle
        if: runner.os == 'macOS'
        run: |
          mkdir -p output/macos/${{ env.APP_NAME }}.app/Contents/MacOS
          mkdir -p output/macos/${{ env.APP_NAME }}.app/Contents/Resources

          cp backend/dist/${{ env.APP_NAME }} output/macos/${{ env.APP_NAME }}.app/Contents/MacOS/
          cp $(which ffmpeg) output/macos/${{ env.APP_NAME }}.app/Contents/MacOS/
          cp $(which ffprobe) output/macos/${{ env.APP_NAME }}.app/Contents/MacOS/

          cat > output/macos/${{ env.APP_NAME }}.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>launch.sh</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon.icns</string>
              <key>CFBundleIdentifier</key>
              <string>com.videodownloader.app</string>
              <key>CFBundleName</key>
              <string>${{ env.APP_NAME }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ env.VERSION }}</string>
              <key>CFBundleVersion</key>
              <string>${{ env.VERSION }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

          cat > output/macos/${{ env.APP_NAME }}.app/Contents/MacOS/launch.sh << 'LAUNCHER'
          #!/bin/bash
          APP_DIR="$(cd "$(dirname "$0")" && pwd)"
          export DYLD_LIBRARY_PATH="$APP_DIR:$DYLD_LIBRARY_PATH"
          exec "$APP_DIR/${{ env.APP_NAME }}" "$@"
          LAUNCHER
          chmod +x output/macos/${{ env.APP_NAME }}.app/Contents/MacOS/launch.sh

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Create DMG
        if: runner.os == 'macOS'
        run: |
          version="${{ env.VERSION }}"
          version="${version#v}"
          [ -z "$version" ] && version="1.0.0"

          mkdir -p output/dmg
          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 200 \
            --icon "${{ env.APP_NAME }}.app" 150 200 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            output/dmg/${{ env.APP_NAME }}-${version}-macos-universal.dmg \
            output/macos/${{ env.APP_NAME }}.app

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: output/dmg/*.dmg
          retention-days: 30

      # =======================================================================
      # Linux Build
      # =======================================================================
      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          cd backend
          pyinstaller ../packaging/VideoDownloader.spec --clean --noconfirm

      - name: Package Linux distribution
        if: runner.os == 'Linux'
        run: |
          version="${{ env.VERSION }}"
          version="${version#v}"
          [ -z "$version" ] && version="1.0.0"

          mkdir -p output/linux
          cp -r backend/dist/* output/linux/
          cp $(which ffmpeg) output/linux/
          cp $(which ffprobe) output/linux/

          cd output/linux
          tar -czf ../${{ env.APP_NAME }}-${version}-linux-x86_64.tar.gz *

      - name: Upload Linux archive
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: output/*.tar.gz
          retention-days: 30

  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: ./artifacts

      - name: Download Linux archive
        uses: actions/download-artifact@v4
        with:
          name: linux-installer
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.exe
            ./artifacts/*.dmg
            ./artifacts/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
