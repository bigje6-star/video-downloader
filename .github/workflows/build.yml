name: Build Installers

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            platform: macos
            artifact_name: VideoDownloader-macos
          - os: windows-latest
            platform: windows
            artifact_name: VideoDownloader-windows
          - os: ubuntu-latest
            platform: linux
            artifact_name: VideoDownloader-linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install FFmpeg (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get install -y ffmpeg

    - name: Install FFmpeg (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install ffmpeg

    - name: Install FFmpeg (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        iwr -useb https://community.chocolatey.org/install.ps1 | iex
        choco install ffmpeg -y

    - name: Build and Install
      shell: bash
      run: |
        echo "=== Building frontend ==="
        cd frontend
        npm ci
        npm run build

        echo "=== Installing Python dependencies ==="
        cd ../backend
        python -m venv venv

        if [ "$RUNNER_OS" == "Windows" ]; then
          source venv/Scripts/activate
        else
          source venv/bin/activate
        fi

        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        cd backend
        source venv/bin/activate
        pyinstaller packaging/VideoDownloader.spec --clean --noconfirm

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        cd backend
        .\venv\Scripts\Activate.ps1
        pyinstaller packaging\VideoDownloader.spec --clean --noconfirm

    - name: Verify build
      shell: bash
      run: |
        cd backend/dist
        echo "Contents:"
        ls -la

        if [ "$RUNNER_OS" == "Windows" ]; then
          if [ -f "VideoDownloader.exe" ]; then
            echo "Build successful!"
          else
            echo "Build failed - no exe"
            exit 1
          fi
        else
          if [ -f "VideoDownloader" ]; then
            echo "Build successful!"
          else
            echo "Build failed - no binary"
            exit 1
          fi
        fi

    - name: Copy FFmpeg (Unix)
      if: runner.os != 'Windows'
      run: |
        cp "$(which ffmpeg)" backend/dist/
        cp "$(which ffprobe)" backend/dist/

    - name: Copy FFmpeg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ffmpeg = (Get-Command ffmpeg).Source
        $ffprobe = (Get-Command ffprobe).Source
        Copy-Item $ffmpeg backend\dist\
        Copy-Item $ffprobe backend\dist\

    - name: Create archive (macOS/Linux)
      if: runner.os != 'Windows'
      run: |
        cd backend/dist
        tar -czf ../VideoDownloader-${{ matrix.platform }}.tar.gz .

    - name: Create archive (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        cd backend\dist
        7z a -tzip ..\VideoDownloader-windows.zip *

    - name: Upload artifact (Unix)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: VideoDownloader-${{ matrix.platform }}
        path: backend/VideoDownloader-${{ matrix.platform }}.tar.gz
        retention-days: 30

    - name: Upload artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: VideoDownloader-windows
        path: backend/VideoDownloader-windows.zip
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/VideoDownloader-macos/VideoDownloader-macos.tar.gz
          ./artifacts/VideoDownloader-linux/VideoDownloader-linux.tar.gz
          ./artifacts/VideoDownloader-windows/VideoDownloader-windows.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
