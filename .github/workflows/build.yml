name: Build Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: VideoDownloader-linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Build
      run: |
        cd frontend
        npm ci
        npm run build

        cd ../backend
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
        pip install pyinstaller

        pyinstaller ../packaging/VideoDownloader.spec --clean --noconfirm

        ls -lah dist/

    - name: Create archive
      run: |
        cd backend/dist
        tar -czf ../VideoDownloader-linux.tar.gz .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoDownloader-linux
        path: backend/VideoDownloader-linux.tar.gz
