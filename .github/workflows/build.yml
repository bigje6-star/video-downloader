name: Build Installers

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            platform: macos
            artifact_name: VideoDownloader-macos
          - os: windows-latest
            platform: windows
            artifact_name: VideoDownloader-windows
          - os: ubuntu-latest
            platform: linux
            artifact_name: VideoDownloader-linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install FFmpeg (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install ffmpeg --quiet
      env:
        HOMEBREW_NO_AUTO_UPDATE: 1
        HOMEBREW_NO_INSTALL_CLEANUP: 1

    - name: Install FFmpeg (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg

    - name: Install FFmpeg (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install ffmpeg -y --no-progress

    - name: Install backend dependencies
      shell: bash
      run: |
        cd backend
        python -m venv venv
        if [ "$RUNNER_OS" == "Windows" ]; then
          source venv/Scripts/activate
        else
          source venv/bin/activate
        fi
        python -m pip install --upgrade pip --quiet
        pip install -r requirements.txt --quiet
        pip install pyinstaller

    - name: Install and build frontend
      run: |
        cd frontend
        npm ci --silent
        npm run build

    - name: Build with PyInstaller (Unix)
      if: runner.os != 'Windows'
      run: |
        cd backend
        source venv/bin/activate
        pyinstaller ../packaging/VideoDownloader.spec --clean --noconfirm --log-level=WARN

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        cd backend
        venv\Scripts\activate
        pyinstaller ..\packaging\VideoDownloader.spec --clean --noconfirm --log-level=WARN

    - name: Verify build output
      shell: bash
      run: |
        cd backend/dist
        echo "=== Build output contents ==="
        ls -lah
        echo "=== Verifying executable ==="
        if [ "$RUNNER_OS" == "Windows" ]; then
          if [ -f "VideoDownloader.exe" ]; then
            echo "✅ VideoDownloader.exe found"
            ls -lh VideoDownloader.exe
          else
            echo "❌ VideoDownloader.exe not found"
            exit 1
          fi
        else
          if [ -f "VideoDownloader" ]; then
            echo "✅ VideoDownloader found"
            ls -lh VideoDownloader
          else
            echo "❌ VideoDownloader not found"
            exit 1
          fi
        fi

    - name: Copy FFmpeg (Unix)
      if: runner.os != 'Windows'
      run: |
        cp "$(which ffmpeg)" backend/dist/
        cp "$(which ffprobe)" backend/dist/
        echo "✅ FFmpeg copied"

    - name: Copy FFmpeg (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        for %%i in ('where ffmpeg.exe') do @copy "%%i" backend\dist\ /Y >nul
        for %%i in ('where ffprobe.exe') do @copy "%%i" backend\dist\ /Y >nul
        @echo FFmpeg copied

    - name: Create archive (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd backend/dist
        tar -czf ../VideoDownloader-macos.tar.gz .

    - name: Create archive (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd backend/dist
        tar -czf ../VideoDownloader-linux.tar.gz .

    - name: Create archive (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        cd backend\dist
        7z a -tzip -mx5 ..\VideoDownloader-windows.zip * -y

    - name: Upload macOS artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VideoDownloader-macos
        path: backend/VideoDownloader-macos.tar.gz
        retention-days: 30

    - name: Upload Linux artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VideoDownloader-linux
        path: backend/VideoDownloader-linux.tar.gz
        retention-days: 30

    - name: Upload Windows artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VideoDownloader-windows
        path: backend/VideoDownloader-windows.zip
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/VideoDownloader-macos/VideoDownloader-macos.tar.gz
          ./artifacts/VideoDownloader-linux/VideoDownloader-linux.tar.gz
          ./artifacts/VideoDownloader-windows/VideoDownloader-windows.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
