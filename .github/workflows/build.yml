name: Build Installers

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Build
      run: |
        cd frontend
        npm ci
        npm run build

        cd ../backend
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
        pip install pyinstaller

        pyinstaller ../packaging/VideoDownloader.spec --clean --noconfirm

        ls -lah dist/

    - name: Create archive
      run: |
        cd backend/dist
        tar -czf ../VideoDownloader-linux.tar.gz .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoDownloader-linux
        path: backend/VideoDownloader-linux.tar.gz
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: VideoDownloader-linux

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: VideoDownloader-linux.tar.gz
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
